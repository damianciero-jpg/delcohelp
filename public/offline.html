<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DelcoHelp — Offline</title>
<style>
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #2D6A4F 0%, #40916C 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; color: white;
  }
  .card {
    max-width: 400px; text-align: center;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(12px);
    padding: 32px 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
  }
  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  p { font-size: 14px; opacity: 0.85; line-height: 1.5; margin-bottom: 20px; }
  .btn {
    display: inline-block; background: white; color: #2D6A4F;
    padding: 12px 24px; border-radius: 12px; font-weight: 600;
    text-decoration: none; margin: 4px; font-size: 14px;
  }
  .btn-outline {
    background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.4);
  }
  .emergency {
    background: #D62828; color: white; padding: 12px; border-radius: 12px;
    margin-top: 16px; font-size: 14px;
  }
  .emergency strong { display: block; font-size: 16px; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>We can't reach the internet right now, but you can still call for help directly.</p>
  <a class="btn" href="tel:211">📞 Call PA 211</a>
  <a class="btn btn-outline" href="tel:988">Call 988 Crisis Line</a>
  <div class="emergency">
    <strong>🚨 In immediate emergency</strong>
    <a href="tel:911" style="color: white; font-weight: 700;">Call 911</a>
  </div>
  <p style="margin-top: 16px; font-size: 12px; opacity: 0.7;">
    Once you're back online, reload this page to access the full app.
  </p>
</div>
</body>
</html>
